services:
  ytdlp-pot-provider:
    image: brainicism/bgutil-ytdlp-pot-provider:1.3.1-node
    restart: unless-stopped
    init: true
    network_mode: host
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4416/ping').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3

  hermes-worker:
    build:
      context: .
      dockerfile: Dockerfile.hermes
    image: crypto-tuber-ranked-hermes-worker:latest
    restart: unless-stopped
    network_mode: host
    depends_on:
      - ytdlp-pot-provider
    env_file:
      - .env.hermes
    environment:
      ML_VERIFIER_PROVIDER: ollama
      OLLAMA_HOST: http://127.0.0.1:11434
      ML_VERIFIER_MODEL: qwen2.5:3b
      YTDLP_BIN: yt-dlp
      YTDLP_COOKIES_PATH: /run/secrets/youtube-cookies.txt
      YTDLP_PO_TOKEN_PROVIDER: wpc
      YTDLP_PO_TOKEN_BROWSER_PATH: /usr/bin/chromium
      YTDLP_PLAYER_CLIENT: web
      YTDLP_JS_RUNTIMES: node
      YTDLP_REMOTE_COMPONENTS: "1"
    volumes:
      - /opt/callscore/secrets/youtube-cookies.txt:/run/secrets/youtube-cookies.txt:ro
    command: ["npm", "run", "pipeline:worker", "--", "--poll-ms", "15000"]

  hermes-worker-once:
    build:
      context: .
      dockerfile: Dockerfile.hermes
    image: crypto-tuber-ranked-hermes-worker:latest
    profiles: ["debug"]
    depends_on:
      - ytdlp-pot-provider
    env_file:
      - .env.hermes
    environment:
      ML_VERIFIER_PROVIDER: ollama
      OLLAMA_HOST: http://127.0.0.1:11434
      ML_VERIFIER_MODEL: qwen2.5:3b
      YTDLP_BIN: yt-dlp
      YTDLP_PO_TOKEN_PROVIDER: wpc
      YTDLP_PO_TOKEN_BROWSER_PATH: /usr/bin/chromium
      YTDLP_PLAYER_CLIENT: web
      YTDLP_JS_RUNTIMES: node
      YTDLP_REMOTE_COMPONENTS: "1"
    entrypoint: ["npm", "run", "pipeline:worker:once", "--"]
    command: ["--dry-run"]

  data-pipeline-continuous:
    build:
      context: .
      dockerfile: Dockerfile.hermes
    image: crypto-tuber-ranked-hermes-worker:latest
    restart: unless-stopped
    depends_on:
      - ytdlp-pot-provider
    env_file:
      - .env.hermes
    environment:
      YTDLP_BIN: yt-dlp
      YTDLP_PO_TOKEN_PROVIDER: wpc
      YTDLP_PO_TOKEN_BROWSER_PATH: /usr/bin/chromium
      YTDLP_PLAYER_CLIENT: web
      YTDLP_JS_RUNTIMES: node
      YTDLP_REMOTE_COMPONENTS: "1"
    command:
      - npm
      - run
      - pipeline:data:continuous
      - --
      - --write
      - --interval-minutes
      - "30"
      - --
      - --limit-low-confidence-validations
      - "500"
      - --limit-price-repairs
      - "1000"
      - --limit-price-matches
      - "1000"
      - --limit-ready-extract-videos
      - "239"
      - --limit-llm-videos
      - "100"

  data-pipeline-continuous-once:
    build:
      context: .
      dockerfile: Dockerfile.hermes
    image: crypto-tuber-ranked-hermes-worker:latest
    profiles: ["debug"]
    depends_on:
      - ytdlp-pot-provider
    env_file:
      - .env.hermes
    environment:
      YTDLP_BIN: yt-dlp
      YTDLP_PO_TOKEN_PROVIDER: wpc
      YTDLP_PO_TOKEN_BROWSER_PATH: /usr/bin/chromium
      YTDLP_PLAYER_CLIENT: web
      YTDLP_JS_RUNTIMES: node
      YTDLP_REMOTE_COMPONENTS: "1"
    entrypoint:
      - npm
      - run
      - pipeline:data:continuous
      - --
    command:
      - --once
      - --dry-run
      - --
      - --limit-low-confidence-validations
      - "50"
      - --limit-price-repairs
      - "100"
      - --limit-price-matches
      - "100"
      - --limit-ready-extract-videos
      - "5"
      - --limit-llm-videos
      - "5"
