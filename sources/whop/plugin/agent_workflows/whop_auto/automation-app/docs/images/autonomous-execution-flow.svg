<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 1350" role="img" aria-labelledby="title desc">
  <title id="title">Execution Loop</title>
  <desc id="desc">Status, plan, consent, dispatch, observe</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfcf6"/>
      <stop offset="0.56" stop-color="#edf6f1"/>
      <stop offset="1" stop-color="#fff4df"/>
    </linearGradient>
    <linearGradient id="dark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12272b"/>
      <stop offset="1" stop-color="#081316"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="22" flood-color="#102027" flood-opacity="0.16"/>
    </filter>
    <pattern id="grid" width="72" height="72" patternUnits="userSpaceOnUse">
      <path d="M72 0H0V72" fill="none" stroke="#102027" stroke-opacity="0.045" stroke-width="1.5"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="13" markerHeight="13" orient="auto">
      <path d="M0 0 12 6 0 12Z" fill="#0b9188"/>
    </marker>
  </defs>
  <style>
    .title { fill: #0b1b1f; font: 900 92px "Segoe UI", Arial, sans-serif; letter-spacing: -3px; }
    .subtitle { fill: #52696b; font: 650 36px "Segoe UI", Arial, sans-serif; letter-spacing: 0; }
    .kicker { fill: #0b9188; font: 900 25px "Segoe UI", Arial, sans-serif; letter-spacing: 3px; }
    .tag { fill: #0b9188; font: 900 24px "Segoe UI", Arial, sans-serif; letter-spacing: 1px; }
    .h { fill: #0b1b1f; font: 900 50px "Segoe UI", Arial, sans-serif; letter-spacing: -1px; }
    .hd { fill: #f7fffb; font: 900 50px "Segoe UI", Arial, sans-serif; letter-spacing: -1px; }
    .s { fill: #31484b; font: 800 31px "Segoe UI", Arial, sans-serif; letter-spacing: 0; }
    .sd { fill: #d8ebe7; font: 800 31px "Segoe UI", Arial, sans-serif; letter-spacing: 0; }
    .m { fill: #0b1b1f; font: 900 38px "Segoe UI", Arial, sans-serif; letter-spacing: 0; }
    .md { fill: #f7fffb; font: 900 38px "Segoe UI", Arial, sans-serif; letter-spacing: 0; }
    .tiny { fill: #52696b; font: 800 22px "Segoe UI", Arial, sans-serif; letter-spacing: 1px; }
    .card { fill: #ffffff; stroke: #d5e1dc; stroke-width: 3; filter: url(#shadow); }
    .dark { fill: url(#dark); stroke: #25474d; stroke-width: 3; filter: url(#shadow); }
    .warm { fill: #fff5df; stroke: #e8d2a2; stroke-width: 3; filter: url(#shadow); }
    .green { fill: #e8f8ef; stroke: #b8dec6; stroke-width: 3; filter: url(#shadow); }
    .line { stroke: #0b9188; stroke-width: 12; marker-end: url(#arrow); fill: none; stroke-linecap: round; }
  </style>
  <rect width="2400" height="1350" fill="url(#paper)"/>
  <rect width="2400" height="1350" fill="url(#grid)"/>
  <path d="M1920 180h360M1980 240h300M2035 300h245" stroke="#0b9188" stroke-width="8" stroke-linecap="round" opacity="0.12"/>
  <path d="M1900 1160h390M1960 1220h330" stroke="#d89824" stroke-width="8" stroke-linecap="round" opacity="0.16"/>
  <text class="kicker" x="130" y="126">HERMES / WHOP AUTONOMY</text>
  <text class="title" x="130" y="235">Execution Loop</text>
  <text class="subtitle" x="130" y="296">Status, plan, consent, dispatch, observe</text>
  <g data-card="badge">
    <rect data-card-rect="true" x="1810" y="94" width="420" height="76" rx="38" fill="#e8f8ef" stroke="#b8dec6" stroke-width="3"/>
    <circle cx="1857" cy="132" r="13" fill="#37b978"/>
    <text class="tag" x="1894" y="142">NO SECRET DATA</text>
  </g>
  
  <g data-card="card">
    <rect data-card-rect="true" class="card" x="125" y="540" width="300" height="350" rx="34"/>
    
    <circle cx="195" cy="615" r="40" fill="#0b9188"/>
    <text x="183" y="631" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="44" font-weight="900">1</text>
    <text class="h" x="179" y="725">Status</text>
    <text class="s" x="183" y="800">Read</text>
  
  </g>
  <path class="line" d="M425 715H575"/>
  <g data-card="card">
    <rect data-card-rect="true" class="card" x="575" y="540" width="300" height="350" rx="34"/>
    
    <circle cx="645" cy="615" r="40" fill="#0b9188"/>
    <text x="633" y="631" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="44" font-weight="900">2</text>
    <text class="h" x="629" y="725">Plan</text>
    <text class="s" x="633" y="800">Map</text>
  
  </g>
  <path class="line" d="M875 715H1025"/>
  <g data-card="warm">
    <rect data-card-rect="true" class="warm" x="1025" y="540" width="300" height="350" rx="34"/>
    
    <circle cx="1095" cy="615" r="40" fill="#0b9188"/>
    <text x="1083" y="631" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="44" font-weight="900">3</text>
    <text class="h" x="1079" y="725">Consent</text>
    <text class="s" x="1083" y="800">Gate</text>
  
  </g>
  <path class="line" d="M1325 715H1475"/>
  <g data-card="card">
    <rect data-card-rect="true" class="card" x="1475" y="540" width="300" height="350" rx="34"/>
    
    <circle cx="1545" cy="615" r="40" fill="#0b9188"/>
    <text x="1533" y="631" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="44" font-weight="900">4</text>
    <text class="h" x="1529" y="725">Dispatch</text>
    <text class="s" x="1533" y="800">Call</text>
  
  </g>
  <path class="line" d="M1775 715H1925"/>
  <g data-card="green">
    <rect data-card-rect="true" class="green" x="1925" y="540" width="300" height="350" rx="34"/>
    
    <circle cx="1995" cy="615" r="40" fill="#0b9188"/>
    <text x="1983" y="631" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="44" font-weight="900">5</text>
    <text class="h" x="1979" y="725">Observe</text>
    <text class="s" x="1983" y="800">Proof</text>
  
  </g>
  <g data-card="warm">
    <rect data-card-rect="true" class="warm" x="420" y="990" width="610" height="190" rx="34"/>
    
    <text class="h" x="470" y="1078">Divergence</text>
    <text class="s" x="474" y="1135">Stop safely</text>
  
  </g>
  <g data-card="green">
    <rect data-card-rect="true" class="green" x="1370" y="990" width="610" height="190" rx="34"/>
    
    <text class="h" x="1420" y="1078">Finalized</text>
    <text class="s" x="1424" y="1135">Proof only</text>
  
  </g>
  
</svg>
